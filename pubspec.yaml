name: smart_iv_monitor_app
description: A medical-grade Flutter application for hospital nurses to monitor and configure the ESP32 Smart IV Drip Monitor device over Bluetooth Low Energy (BLE).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.36.8
  provider: ^6.1.2
  intl: ^0.19.0
  vibration: ^3.2.0
  flutter_local_notifications: ^17.2.4
  permission_handler: ^11.4.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
